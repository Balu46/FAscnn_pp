# =========================
# Training
# =========================
training:
  cityscapes_root: ./data/cityscapes
  num_epochs: 400
  batch_size: 8
  num_workers: 4
  lr: 0.045
  momentum: 0.9
  weight_decay: 0.00004
  amp: true

  # only for fascnn_pp
  use_lovasz: false
  is_finetune: false 

  # EMA
  use_ema: false
  ema_decay: 0.999

  # Knowledge Distillation (KD)
  use_kd: false

  # ClassMix
  use_classmix: false
  classmix_prob: 0.5

  # Class Weights
  class_weights_type: "none"

  # Copy-Paste
  copy_paste_prob: 0.0

  # Endgame (disables CP and Teacher model at 85% progress by default)
  use_endgame: false
  endgame_threshold: 0.85

  ignore_index: 255
  log_every: 250

  eval_every_epochs: 1
  warmup_epochs: 15

  save_dir: checkpoints/{model}
  resume_path: ""
  poly_power: 0.9
  aug: true
  crop_size: [512, 1024]
  scale_range: [0.5, 2.0]
  flip_p: 0.5

  noise_std: 0
  noise_p: 0

  # noise_std: 0.05
  # noise_p: 0.5

  brightness: 0.4
  mean: [0.286, 0.325, 0.283]
  std: [0.176, 0.181, 0.177]

  # mean: [0.485, 0.456, 0.406] # Imadge net weights
  # std: [0.229, 0.224, 0.225]

  size: [512, 1024]

# =========================
# Testing
# =========================
test:
  batch_size: 1
  num_workers: 4
  image_size: [512, 1024]
  cityscapes_root: ./data/cityscapes
  save_vis_per_batch: 2
  warmup_iters: 10
  device: auto
  ablation: ""
  weights_path: "" # path to weights, e.g. checkpoints/FAscnn_pp_V18/best.pt
  use_ema: false

# =========================   
# Model
# =========================
model:
  name: FastSCNN # ENet, ENet_v2, ENet_v3, FastSCNN, FAscnn_pp_V3, FAscnn_pp_V6, FAscnn_pp_V11, FAscnn_pp_V12, FAscnn_pp_V13, FAscnn_pp_V14, FAscnn_pp_V18, all
  num_classes: 19

# ========================= 
# Pretrained (FastSCNN only)
# =========================
pretrained:
  enabled: false
  dataset: citys
  root: ./weights
  map_cpu: false

# =========================
# Patching (applied after model build)
# =========================
patch:
  use_patching: false
  tile_size: [64, 64]
  overlap: [8, 8]
